<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>FitLio Pro AI</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --bg: #f2f4f7; --card: #ffffff; --text: #1c1c1e; --accent: #34c759; --water: #007aff; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 15px 15px 100px; }
        
        /* Головний екран */
        .stats-card { background: var(--card); border-radius: 30px; padding: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); text-align: center; margin-bottom: 15px; }
        .progress-circle { position: relative; width: 160px; height: 160px; margin: 0 auto 20px; }
        svg { transform: rotate(-90deg); width: 160px; height: 160px; }
        circle { fill: none; stroke-width: 14; stroke-linecap: round; }
        .bg-c { stroke: #eee; }
        .bar-c { stroke: var(--accent); stroke-dasharray: 440; stroke-dashoffset: 440; transition: 1s; }
        .macros { display: flex; justify-content: space-around; margin-top: 15px; font-size: 14px; }
        
        /* Кнопки */
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .btn-card { background: var(--card); border-radius: 20px; padding: 20px; text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,0.03); cursor: pointer; }
        
        /* Чат */
        #chatModal { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: white; z-index: 1000; display: none; flex-direction: column; 
        }
        .chat-header { padding: 20px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; font-weight: bold; }
        .chat-messages { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .msg { padding: 10px 15px; border-radius: 15px; max-width: 80%; font-size: 14px; }
        .msg.user { background: #e1ffeb; align-self: flex-end; }
        .msg.bot { background: #f0f0f0; align-self: flex-start; }
        .chat-input-area { padding: 20px; border-top: 1px solid #eee; display: flex; gap: 10px; }
        input[type="text"] { flex: 1; padding: 12px; border: 1px solid #ddd; border-radius: 10px; outline: none; }
        .send-btn { background: var(--accent); color: white; padding: 10px 20px; border-radius: 10px; font-weight: bold; }

        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; padding: 20px; background: rgba(242,244,247,0.9); backdrop-filter: blur(10px); }
        .scan-btn { background: #1c1c1e; color: white; padding: 18px; border-radius: 22px; text-align: center; font-weight: bold; }
    </style>
</head>
<body>

    <div class="stats-card">
        <div class="progress-circle">
            <svg><circle class="bg-c" cx="80" cy="80" r="70"></circle>
                 <circle id="bar" class="bar-c" cx="80" cy="80" r="70"></circle></svg>
            <div style="position: absolute; top:50%; left:50%; transform:translate(-50%,-50%);">
                <div id="kcal" style="font-size: 28px; font-weight: 800;">0</div>
                <div style="font-size: 10px; color: #888;">ккал сьогодні</div>
            </div>
        </div>
        <div class="macros">
            <div><b id="p">0г</b><br><small>Білки</small></div>
            <div><b id="f">0г</b><br><small>Жири</small></div>
            <div><b id="c">0г</b><br><small>Вугл</small></div>
        </div>
    </div>

    <div class="grid">
        <div class="btn-card" style="grid-column: span 2; background: #34c759; color: white;">📈 Мій прогрес</div>
        <div class="btn-card" onclick="addWater()">💧 <br><b>+250 мл</b><br><small id="w">0л</small></div>
        <div class="btn-card" onclick="toggleChat(true)">💬 <br><b>Чат з ШІ</b></div>
    </div>

    <div id="chatModal">
        <div class="chat-header">Чат з Тренером <span onclick="toggleChat(false)" style="color:red">✕</span></div>
        <div id="chatMsgs" class="chat-messages"></div>
        <div class="chat-input-area">
            <input type="text" id="chatInput" placeholder="Ваше питання...">
            <div class="send-btn" onclick="sendMsg()">➔</div>
        </div>
    </div>

    <div class="bottom-nav">
        <label for="file" class="scan-btn">📷 СКАНУВАТИ СТРАВУ</label>
        <input type="file" id="file" accept="image/*" style="display:none" onchange="upload()">
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        const uid = tg.initDataUnsafe.user?.id || "test_user";
        const API = "https://fitness-app-production-b4a3.up.railway.app"; // <--- ЗАМІНИ НА СВОЄ ПОСИЛАННЯ

        async function load() {
            const r = await fetch(`${API}/stats?user_id=${uid}`);
            const d = await r.json();
            document.getElementById('kcal').innerText = d.kcal;
            document.getElementById('p').innerText = d.p+'г';
            document.getElementById('f').innerText = d.f+'г';
            document.getElementById('c').innerText = d.c+'г';
            document.getElementById('w').innerText = d.water+'л';
            const offset = 440 - (440 * d.kcal / 2100);
            document.getElementById('bar').style.strokeDashoffset = Math.max(0, offset);
        }

        async function addWater() {
            await fetch(`${API}/add_water?user_id=${uid}&amount=0.25`, {method:'POST'});
            tg.HapticFeedback.impactOccurred('light');
            load();
        }

        async function upload() {
            const fd = new FormData();
            fd.append('file', document.getElementById('file').files[0]);
            document.querySelector('.scan-btn').innerText = "⏳ АНАЛІЗ...";
            await fetch(`${API}/analyze?user_id=${uid}`, {method:'POST', body:fd});
            document.querySelector('.scan-btn').innerText = "📷 СКАНУВАТИ СТРАВУ";
            load();
        }

        function toggleChat(show) { document.getElementById('chatModal').style.display = show ? 'flex' : 'none'; }

        async function sendMsg() {
            const inp = document.getElementById('chatInput');
            const box = document.getElementById('chatMsgs');
            if(!inp.value) return;
            const txt = inp.value;
            box.innerHTML += `<div class="msg user">${txt}</div>`;
            inp.value = "";
            const r = await fetch(`${API}/chat?user_id=${uid}&message=${encodeURIComponent(txt)}`, {method:'POST'});
            const d = await r.json();
            box.innerHTML += `<div class="msg bot">${d.reply}</div>`;
            box.scrollTop = box.scrollHeight;
        }

        load();
        tg.expand();
    </script>
</body>
</html>
