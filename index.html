<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>FitLio Pro</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --bg: #f8fafc; --card: #ffffff; --text: #1e293b; --accent: #10b981; --blue: #3b82f6; --pink: #ec4899; --indigo: #6366f1; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 15px; }
        .neu-card { background: var(--card); border-radius: 28px; padding: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.04); margin-bottom: 15px; }
        .macro-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 15px; }
        .ring-box { position: relative; width: 85px; height: 85px; margin: 0 auto; text-align: center; cursor: pointer; }
        .ring-box svg { transform: rotate(-90deg); width: 85px; height: 85px; }
        circle { fill: none; stroke-width: 6; stroke-linecap: round; }
        .ring-fg { stroke-dasharray: 226; stroke-dashoffset: 226; transition: 0.6s ease; }
        .ring-label { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; line-height: 1.1; pointer-events: none; }
        .ring-label b { font-size: 12px; }
        .ring-label small { font-size: 8px; color: #64748b; }
        .meal-card { background: #fff; border-radius: 20px; padding: 15px; margin-bottom: 10px; border: 1px solid #f1f5f9; }
        .btn { border: none; border-radius: 12px; padding: 12px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.6); display: none; align-items: center; justify-content: center; z-index: 1000; backdrop-filter: blur(5px); }
        .modal-content { width: 90%; background: #fff; padding: 25px; border-radius: 30px; max-height: 85vh; overflow-y: auto; }
        .chat-btn { position: fixed; bottom: 20px; right: 20px; background: var(--indigo); color: #fff; width: 60px; height: 60px; border-radius: 30px; display: flex; align-items: center; justify-content: center; font-size: 24px; box-shadow: 0 5px 15px rgba(99,102,241,0.4); z-index: 99; }
        .food-item { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid #f1f5f9; font-size: 14px; }
        .del-x { color: var(--pink); font-weight: bold; padding: 5px; cursor: pointer; }
        input, select, textarea { width: 100%; padding: 12px; border-radius: 12px; border: 1px solid #e2e8f0; margin-top: 8px; box-sizing: border-box; }
        .chat-box { height: 200px; overflow-y: auto; margin-bottom: 10px; background: #f8fafc; border-radius: 12px; padding: 10px; font-size: 14px; }
        .msg { margin-bottom: 8px; padding: 8px; border-radius: 10px; }
        .ai { background: #e0f2fe; } .user { background: #fff; border: 1px solid #eee; text-align: right; }
    </style>
</head>
<body>

    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
        <h2 style="margin:0;">FitLio Pro</h2>
        <button class="btn" style="background:none; font-size:24px;" onclick="openModal('profileModal')">⚙️</button>
    </div>

    <div class="neu-card">
        <div style="text-align:center; position:relative; margin-bottom:15px;">
            <svg width="140" height="140" viewBox="0 0 160 160" style="transform: rotate(-90deg);">
                <circle stroke="#f1f5f9" stroke-width="12" cx="80" cy="80" r="72"></circle>
                <circle id="m_ring" stroke="var(--accent)" stroke-width="12" stroke-dasharray="452" cx="80" cy="80" r="72"></circle>
            </svg>
            <div style="position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);">
                <h1 id="k_left" style="margin:0;">0</h1><small>ккал залишилось</small>
            </div>
        </div>
        <div class="macro-grid">
            <div class="ring-box" onclick="showSort('p', 'Білки')"><svg viewBox="0 0 80 80"><circle stroke="#f1f5f9" cx="40" cy="40" r="36"></circle><circle id="r_p" class="ring-fg" stroke="var(--accent)" cx="40" cy="40" r="36"></circle></svg><div class="ring-label"><b id="v_p">0</b><small id="n_p">/--</small><small>БІЛОК</small></div></div>
            <div class="ring-box" onclick="showSort('f', 'Жири')"><svg viewBox="0 0 80 80"><circle stroke="#f1f5f9" cx="40" cy="40" r="36"></circle><circle id="r_f" class="ring-fg" stroke="#f59e0b" cx="40" cy="40" r="36"></circle></svg><div class="ring-label"><b id="v_f">0</b><small id="n_f">/--</small><small>ЖИРИ</small></div></div>
            <div class="ring-box" onclick="showSort('c', 'Вугл')"><svg viewBox="0 0 80 80"><circle stroke="#f1f5f9" cx="40" cy="40" r="36"></circle><circle id="r_c" class="ring-fg" stroke="var(--blue)" cx="40" cy="40" r="36"></circle></svg><div class="ring-label"><b id="v_c">0</b><small id="n_c">/--</small><small>ВУГЛ</small></div></div>
            <div class="ring-box" onclick="showSort('sugar', 'Цукор')"><svg viewBox="0 0 80 80"><circle stroke="#f1f5f9" cx="40" cy="40" r="36"></circle><circle id="r_sugar" class="ring-fg" stroke="var(--pink)" cx="40" cy="40" r="36"></circle></svg><div class="ring-label"><b id="v_sugar">0</b><small id="n_sugar">/50</small><small>ЦУКОР</small></div></div>
            <div class="ring-box" onclick="showSort('salt', 'Сіль')"><svg viewBox="0 0 80 80"><circle stroke="#f1f5f9" cx="40" cy="40" r="36"></circle><circle id="r_salt" class="ring-fg" stroke="var(--indigo)" cx="40" cy="40" r="36"></circle></svg><div class="ring-label"><b id="v_salt">0</b><small id="n_salt">/5</small><small>СІЛЬ</small></div></div>
            <div class="ring-box"><svg viewBox="0 0 80 80"><circle stroke="#f1f5f9" cx="40" cy="40" r="36"></circle><circle id="r_water" class="ring-fg" stroke="#0ea5e9" cx="40" cy="40" r="36"></circle></svg><div class="ring-label"><b id="v_water">0</b><small>/2.5</small><small>ВОДА</small></div></div>
        </div>
    </div>

    <div id="meals_list">
        <div class="meal-card" onclick="toggleMeal('Breakfast')"><b>🍳 Сніданок</b>: <span id="k_Breakfast">0</span> ккал <button class="btn" style="float:right; padding:2px 8px;" onclick="event.stopPropagation(); openAdd('Breakfast')">+</button><div id="det_Breakfast" style="display:none; margin-top:10px;"></div></div>
        <div class="meal-card" onclick="toggleMeal('Lunch')"><b>🍲 Обід</b>: <span id="k_Lunch">0</span> ккал <button class="btn" style="float:right; padding:2px 8px;" onclick="event.stopPropagation(); openAdd('Lunch')">+</button><div id="det_Lunch" style="display:none; margin-top:10px;"></div></div>
        <div class="meal-card" onclick="toggleMeal('Dinner')"><b>🥗 Вечеря</b>: <span id="k_Dinner">0</span> ккал <button class="btn" style="float:right; padding:2px 8px;" onclick="event.stopPropagation(); openAdd('Dinner')">+</button><div id="det_Dinner" style="display:none; margin-top:10px;"></div></div>
    </div>

    <div id="sortModal" class="modal"><div class="modal-content"><h3 id="sortTitle">Топ</h3><div id="sortList"></div><button class="btn" style="width:100%; margin-top:15px;" onclick="closeModal('sortModal')">Закрити</button></div></div>
    
    <div id="chatModal" class="modal"><div class="modal-content"><h3>Тренер ШІ</h3><div id="chatBox" class="chat-box"></div><input id="chatIn" placeholder="Питання..."><button class="btn" style="width:100%; margin-top:10px; background:var(--indigo); color:#fff;" onclick="askCoach()">Запитати</button><button class="btn" style="width:100%; margin-top:5px;" onclick="closeModal('chatModal')">Закрити</button></div></div>

    <div id="profileModal" class="modal"><div class="modal-content"><h3>Профіль</h3><input id="p_w" type="number" placeholder="Вага"><input id="p_kcal" type="number" placeholder="Ккал"><button class="btn" style="width:100%; background:var(--accent); color:#fff; margin-top:15px;" onclick="saveProfile()">Зберегти</button></div></div>

    <div id="inputModal" class="modal"><div class="modal-content"><h3>Додати</h3><button class="btn" style="width:100%; background:var(--accent); color:#fff;" onclick="document.getElementById('fIn').click()">Фото</button><textarea id="tFood" placeholder="Або текст..."></textarea><button class="btn" style="width:100%; margin-top:10px;" onclick="doAnalyze()">ШІ Аналіз</button></div></div>

    <div id="confirmModal" class="modal"><div class="modal-content"><h3>Результат</h3><input id="en"><input id="ek" type="number" placeholder="ккал"><button class="btn" style="width:100%; background:var(--accent); color:#fff; margin-top:15px;" onclick="finalSave()">Записати</button></div></div>

    <div class="chat-btn" onclick="openModal('chatModal')">💬</div>
    <input type="file" id="fIn" style="display:none" onchange="doAnalyze()">

    <script>
        const tg = window.Telegram.WebApp; const uid = tg.initDataUnsafe.user?.id || "test_user";
        const API = "https://fitness-app-production-b4a3.up.railway.app";
        let selectedDate = new Date().toISOString().split('T')[0], activeMeal = "", lastStats = {};

        async function load() {
            const r = await fetch(`${API}/stats?user_id=${uid}&date=${selectedDate}`);
            const d = await r.json(); lastStats = d;
            if(!d.profile) openModal('profileModal');
            
            document.getElementById('k_left').innerText = Math.max(0, d.norms.kcal - d.kcal);
            document.getElementById('m_ring').style.strokeDashoffset = 452 - (452 * Math.min(1, d.kcal/d.norms.kcal));
            
            const upR = (id, vId, nId, v, n) => {
                document.getElementById(id).style.strokeDashoffset = 226 - (226 * Math.min(1, v/(n || 1)));
                document.getElementById(vId).innerText = Math.round(v || 0);
                if(nId) document.getElementById(nId).innerText = `/${n || 0}`;
            };
            upR('r_p','v_p','n_p', d.p, d.norms.p); upR('r_f','v_f','n_f', d.f, d.norms.f); upR('r_c','v_c','n_c', d.c, d.norms.c);
            upR('r_sugar','v_sugar','n_sugar', d.sugar, 50); upR('r_salt','v_salt','n_salt', d.salt, 5); upR('r_water','v_water',null, d.water, 2.5);

            for (let mt in d.meals) {
                document.getElementById('k_'+mt).innerText = d.meals[mt].kcal;
                document.getElementById('det_'+mt).innerHTML = d.meals[mt].list.map(i => `
                    <div class="food-item">
                        <span>${i.name} (<b>${i.kcal}</b>)</span>
                        <span class="del-x" onclick="event.stopPropagation(); delFood(${i.id})">🗑️</span>
                    </div>`).join('');
            }
        }

        function showSort(key, label) {
            let all = [];
            for (let mt in lastStats.meals) all = all.concat(lastStats.meals[mt].list);
            all.sort((a, b) => (b[key] || 0) - (a[key] || 0));
            document.getElementById('sortTitle').innerText = "Топ за: " + label;
            document.getElementById('sortList').innerHTML = all.map(i => `
                <div class="food-item">
                    <span>${i.name} (<b>${i[key]}</b>)</span>
                    <span class="del-x" onclick="delFood(${i.id}); closeModal('sortModal');">🗑️</span>
                </div>`).join('');
            openModal('sortModal');
        }

        async function delFood(id) { if(confirm("Видалити?")) { await fetch(`${API}/delete_food/${id}`, {method:'DELETE'}); load(); } }

        async function askCoach() {
            const m = document.getElementById('chatIn').value; if(!m) return;
            document.getElementById('chatBox').innerHTML += `<div class="msg user">${m}</div>`;
            const r = await fetch(`${API}/coach_chat`, {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({msg:m, stats: JSON.stringify(lastStats.norms)})});
            const d = await r.json();
            document.getElementById('chatBox').innerHTML += `<div class="msg ai">${d.reply}</div>`;
            document.getElementById('chatIn').value = "";
        }

        async function saveProfile() {
            const data = { user_id:String(uid), weight:Number(document.getElementById('p_w').value), height:0, goal:'maintain', c_kcal:Number(document.getElementById('p_kcal').value || 2000), c_p:120, c_f:70, c_c:250 };
            await fetch(`${API}/save_profile`, {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(data)});
            closeModal('profileModal'); load();
        }

        async function doAnalyze() {
            const fd = new FormData();
            if(document.getElementById('fIn').files[0]) fd.append('file', document.getElementById('fIn').files[0]);
            if(document.getElementById('tFood').value) fd.append('text_input', document.getElementById('tFood').value);
            const r = await fetch(`${API}/analyze`, {method:'POST', body:fd});
            const res = await r.json();
            document.getElementById('en').value=res.name; document.getElementById('ek').value=res.kcal; 
            closeModal('inputModal'); openModal('confirmModal');
        }

        async function finalSave() {
            const data = { user_id:uid, date:selectedDate, meal_type:activeMeal, name:document.getElementById('en').value, kcal:document.getElementById('ek').value };
            await fetch(`${API}/confirm_save`, {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(data)});
            closeModal('confirmModal'); load();
        }

        function toggleMeal(mt) { const d=document.getElementById('det_'+mt); d.style.display=d.style.display==='none'?'block':'none'; }
        function openModal(id) { document.getElementById(id).style.display='flex'; }
        function closeModal(id) { document.getElementById(id).style.display='none'; }
        function openAdd(mt) { activeMeal=mt; openModal('inputModal'); }
        load(); tg.expand();
    </script>
</body>
</html>
