<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>FitLio Salt & Sugar Pro</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --bg: #e0e5ec; --text: #31344b; --accent: #34c759; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; }
        
        /* Neumorphism Стиль Картки */
        .card { 
            background: var(--bg); 
            border-radius: 25px; 
            padding: 25px; 
            text-align: center; 
            box-shadow: 7px 7px 15px #babecc, -7px -7px 15px #ffffff; 
            margin-bottom: 20px; 
        }
        
        h1 { font-size: 32px; font-weight: 800; margin: 0 0 10px; text-shadow: 1px 1px 1px #fff; }
        
        /* Neumorphism Кнопка */
        .btn { 
            background: var(--bg); 
            border: none; 
            border-radius: 15px; 
            padding: 20px; 
            font-weight: bold; 
            cursor: pointer; 
            box-shadow: 4px 4px 8px #babecc, -4px -4px 8px #ffffff; 
            transition: 0.2s; 
        }
        .btn:active { box-shadow: inset 2px 2px 5px #babecc, inset -2px -2px 5px #ffffff; }

        /* Прогрес Бари */
        .prog-row { display: flex; align-items: center; justify-content: space-between; margin-top: 10px; font-size: 12px; }
        .prog-bg { background: #f0f0f0; border-radius: 10px; width: 60%; height: 8px; overflow: hidden; box-shadow: inset 1px 1px 2px #babecc; }
        .prog-bar { background: var(--accent); height: 100%; border-radius: 10px; width: 0%; transition: 0.5s; }
    </style>
</head>
<body>

    <div class="card">
        <h1 id="kcal">0</h1>
        <p style="color: #888; font-size: 10px;">ккал сьогодні</p>
        
        <div class="prog-row">
            <span>Цукор (Норма: 25г)</span>
            <div class="prog-bg"><div id="sug_bar" class="prog-bar" style="background:#ff9500;"></div></div>
            <span id="sug">0г</span>
        </div>
        <div class="prog-row">
            <span>Сіль (Норма: 5г)</span>
            <div class="prog-bg"><div id="salt_bar" class="prog-bar" style="background:#007aff;"></div></div>
            <span id="salt">0г</span>
        </div>
    </div>

    <div class="grid" style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
        <button class="btn" onclick="addW()">💧 +250мл</button>
        <button class="btn" onclick="toggleChat(true)">💬 Чат з ШІ</button>
    </div>

    <label for="fIn" class="btn" style="position: fixed; bottom: 20px; left: 20px; right: 20px; text-align: center; background: #1c1c1e; color: white;">📸 СКАНУВАТИ СТРАВУ</label>
    <input type="file" id="fIn" accept="image/*" style="display:none" onchange="upload()">

    <script>
        const tg = window.Telegram.WebApp;
        const uid = tg.initDataUnsafe.user?.id || "user_test";
        const API = "https://fitness-app-production-b4a3.up.railway.app"; 

        async function load() {
            try {
                const r = await fetch(`${API}/stats?user_id=${uid}`);
                const d = await r.json();
                document.getElementById('kcal').innerText = d.kcal || 0;
                document.getElementById('sug').innerText = (d.sugar || 0) + 'г';
                document.getElementById('salt').innerText = (d.salt || 0) + 'г';
                
                // Оновлення прогрес-барів
                const sugOff = Math.min(100, (d.sugar || 0) / 25 * 100);
                document.getElementById('sug_bar').style.width = sugOff + '%';
                const saltOff = Math.min(100, (d.salt || 0) / 5 * 100);
                document.getElementById('salt_bar').style.width = saltOff + '%';
            } catch(e) { console.error("API Error:", e); }
        }

        // (Функції addW, toggleChat, send, upload - як у v48.0)
        
        load();
    </script>
</body>
</html>
