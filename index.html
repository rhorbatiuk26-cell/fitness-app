<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FitLio AI</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --accent-color: #22c55e;
            --text-main: #f8fafc;
        }
        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0; padding: 20px;
            display: flex; flex-direction: column; align-items: center;
        }
        .header { text-align: center; margin-bottom: 30px; }
        .header h1 { font-size: 24px; margin: 0; color: var(--accent-color); }

        /* Кільце прогресу */
        .progress-container {
            position: relative;
            width: 200px; height: 200px;
            margin-bottom: 30px;
        }
        .circle-bg { fill: none; stroke: #334155; stroke-width: 10; }
        .circle-progress {
            fill: none; stroke: var(--accent-color);
            stroke-width: 10; stroke-linecap: round;
            stroke-dasharray: 565; stroke-dashoffset: 565;
            transition: stroke-dashoffset 1s ease-out;
            transform: rotate(-90deg); transform-origin: 50% 50%;
        }
        .progress-text {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
        }
        .progress-text span { font-size: 28px; font-weight: bold; display: block; }
        .progress-text small { color: #94a3b8; }

        /* Картки */
        .card {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 20px; width: 100%;
            box-sizing: border-box;
            border: 1px solid rgba(255,255,255,0.1);
            margin-bottom: 15px;
        }
        .btn-scan {
            background: var(--accent-color);
            color: white; border: none;
            padding: 15px 30px; border-radius: 15px;
            font-size: 18px; font-weight: bold;
            width: 100%; cursor: pointer;
            display: flex; align-items: center; justify-content: center; gap: 10px;
        }
        #res { margin-top: 15px; font-size: 14px; line-height: 1.5; color: #cbd5e1; }
        input[type="file"] { display: none; }
    </style>
</head>
<body>

    <div class="header">
        <h1>FitLio AI 🥗</h1>
    </div>

    <div class="progress-container">
        <svg width="200" height="200">
            <circle class="circle-bg" cx="100" cy="100" r="90"></circle>
            <circle id="progressBar" class="circle-progress" cx="100" cy="100" r="90"></circle>
        </svg>
        <div class="progress-text">
            <span id="kcalVal">0</span>
            <small>ккал сьогодні</small>
        </div>
    </div>

    <div class="card">
        <label for="fileInput" class="btn-scan">
            📸 СКАНУВАТИ СТРАВУ
        </label>
        <input type="file" id="fileInput" accept="image/*" onchange="scanFood()">
        <div id="res">Натисніть кнопку, щоб додати прийом їжі</div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        const user_id = tg.initDataUnsafe.user?.id || 12345;

        // Функція оновлення кільця
        function updateProgress(current, goal = 2000) {
            const circle = document.getElementById('progressBar');
            const kcalText = document.getElementById('kcalVal');
            const radius = 90;
            const circumference = 2 * Math.PI * radius;
            const offset = circumference - (current / goal) * circumference;
            circle.style.strokeDashoffset = offset < 0 ? 0 : offset;
            kcalText.innerText = Math.round(current);
        }

        async function scanFood() {
            const fileInput = document.getElementById('fileInput');
            const out = document.getElementById('res');
            if (!fileInput.files[0]) return;

            out.innerText = "⏳ ШІ аналізує страву...";
            const fd = new FormData();
            fd.append('file', fileInput.files[0]);

            try {
                // ВАЖЛИВО: Заміни на своє посилання Railway
                const r = await fetch(`https://fitness-app-production-b4a3.up.railway.app/analyze?user_id=${user_id}`, {
                    method: 'POST',
                    body: fd
                });
                const d = await r.json();
                out.innerText = d.result;
                loadStats(); // Оновлюємо кільце після сканування
            } catch (err) {
                out.innerText = "Помилка зв'язку з сервером.";
            }
        }

        async function loadStats() {
            try {
                const r = await fetch(`https://fitness-app-production-b4a3.up.railway.app/stats?user_id=${user_id}`);
                const d = await r.json();
                updateProgress(d.total);
            } catch (e) { console.log("Stats error"); }
        }

        loadStats();
    </script>
</body>
</html>
