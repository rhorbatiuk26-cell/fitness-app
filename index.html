<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>FitLio Elite v68</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --bg: #f8fafc; --card: #ffffff; --text: #1e293b; --accent: #10b981; --blue: #3b82f6; --pink: #ec4899; --indigo: #6366f1; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 15px; padding-bottom: 50px; }
        .neu-card { background: var(--card); border-radius: 28px; padding: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.04); margin-bottom: 20px; }
        .neu-btn { background: var(--card); border: none; border-radius: 16px; padding: 15px; font-weight: bold; box-shadow: 0 4px 10px rgba(0,0,0,0.05); cursor: pointer; }
        
        /* Кільця БЖВ */
        .macro-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-top: 20px; }
        .ring-box { position: relative; width: 85px; height: 85px; margin: 0 auto; }
        .ring-box svg { transform: rotate(-90deg); width: 85px; height: 85px; }
        circle { fill: none; stroke-width: 7; stroke-linecap: round; }
        .ring-fg { stroke-dasharray: 220; stroke-dashoffset: 220; transition: 0.6s ease; }
        .ring-label { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 11px; }

        /* Категорії їжі */
        .meal-card { background: #fff; border-radius: 20px; padding: 18px; margin-bottom: 12px; border: 1px solid #f1f5f9; transition: 0.3s; }
        .meal-info { display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
        .meal-details { display: none; margin-top: 15px; padding-top: 15px; border-top: 1px dashed #e2e8f0; }
        .food-row { display: flex; justify-content: space-between; font-size: 14px; margin-bottom: 8px; color: #64748b; }

        #confirmModal, #inputModal, #profileModal { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: none; align-items: center; justify-content: center; z-index: 1000; backdrop-filter: blur(4px); }
        .modal-content { width: 90%; background: #fff; padding: 25px; border-radius: 30px; }
        input { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #eee; margin: 5px 0 15px; }
    </style>
</head>
<body>

    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
        <div><h2 style="margin:0;">Мій Баланс</h2><b id="w_head" style="color:var(--blue);">-- кг</b></div>
        <button class="neu-btn" style="padding:10px 20px; color:var(--blue);" onclick="openProfile()">⚙️</button>
    </div>

    <div class="neu-card">
        <div style="text-align:center; position:relative; margin-bottom: 20px;">
            <svg width="160" height="160" viewBox="0 0 160 160" style="transform: rotate(-90deg);">
                <circle stroke="#f1f5f9" stroke-width="12" cx="80" cy="80" r="70"></circle>
                <circle id="main_kcal_ring" stroke="var(--accent)" stroke-width="12" stroke-dasharray="440" stroke-dashoffset="440" stroke-linecap="round" cx="80" cy="80" r="70"></circle>
            </svg>
            <div style="position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);">
                <h1 id="kcal_left" style="margin:0; font-size:36px;">0</h1>
                <small style="color:gray;">залишилось</small>
            </div>
        </div>

        <div class="macro-grid">
            <div class="ring-box"><svg viewBox="0 0 80 80"><circle stroke="#f1f5f9" cx="40" cy="40" r="35"></circle><circle id="r_p" class="ring-fg" stroke="var(--accent)" cx="40" cy="40" r="35"></circle></svg><div class="ring-label"><b id="v_p">0</b><small>Біл</small></div></div>
            <div class="ring-box"><svg viewBox="0 0 80 80"><circle stroke="#f1f5f9" cx="40" cy="40" r="35"></circle><circle id="r_f" class="ring-fg" stroke="#f59e0b" cx="40" cy="40" r="35"></circle></svg><div class="ring-label"><b id="v_f">0</b><small>Жир</small></div></div>
            <div class="ring-box"><svg viewBox="0 0 80 80"><circle stroke="#f1f5f9" cx="40" cy="40" r="35"></circle><circle id="r_c" class="ring-fg" stroke="var(--blue)" cx="40" cy="40" r="35"></circle></svg><div class="ring-label"><b id="v_c">0</b><small>Вуг</small></div></div>
            <div class="ring-box"><svg viewBox="0 0 80 80"><circle stroke="#f1f5f9" cx="40" cy="40" r="35"></circle><circle id="r_sugar" class="ring-fg" stroke="var(--pink)" cx="40" cy="40" r="35"></circle></svg><div class="ring-label"><b id="v_sugar">0</b><small>Цук</small></div></div>
            <div class="ring-box"><svg viewBox="0 0 80 80"><circle stroke="#f1f5f9" cx="40" cy="40" r="35"></circle><circle id="r_salt" class="ring-fg" stroke="var(--indigo)" cx="40" cy="40" r="35"></circle></svg><div class="ring-label"><b id="v_salt">0</b><small>Сіль</small></div></div>
            <div class="ring-box"><svg viewBox="0 0 80 80"><circle stroke="#f1f5f9" cx="40" cy="40" r="35"></circle><circle id="r_water" class="ring-fg" stroke="#0ea5e9" cx="40" cy="40" r="35"></circle></svg><div class="ring-label"><b id="v_water">0</b><small>Вода</small></div></div>
        </div>
    </div>

    <div id="meals_container">
        <div class="meal-card" onclick="toggleMeal('Breakfast')">
            <div class="meal-info"><b>🍳 Сніданок</b><div><span id="kcal_Breakfast">0</span> ккал <button class="neu-btn" style="padding:5px 10px; margin-left:10px;" onclick="event.stopPropagation(); openAdd('Breakfast')">+</button></div></div>
            <div id="det_Breakfast" class="meal-details"></div>
        </div>
        <div class="meal-card" onclick="toggleMeal('Lunch')">
            <div class="meal-info"><b>🍲 Обід</b><div><span id="kcal_Lunch">0</span> ккал <button class="neu-btn" style="padding:5px 10px; margin-left:10px;" onclick="event.stopPropagation(); openAdd('Lunch')">+</button></div></div>
            <div id="det_Lunch" class="meal-details"></div>
        </div>
        <div class="meal-card" onclick="toggleMeal('Dinner')">
            <div class="meal-info"><b>🥗 Вечеря</b><div><span id="kcal_Dinner">0</span> ккал <button class="neu-btn" style="padding:5px 10px; margin-left:10px;" onclick="event.stopPropagation(); openAdd('Dinner')">+</button></div></div>
            <div id="det_Dinner" class="meal-details"></div>
        </div>
        <div class="meal-card" onclick="toggleMeal('Snack')">
            <div class="meal-info"><b>🍎 Перекус</b><div><span id="kcal_Snack">0</span> ккал <button class="neu-btn" style="padding:5px 10px; margin-left:10px;" onclick="event.stopPropagation(); openAdd('Snack')">+</button></div></div>
            <div id="det_Snack" class="meal-details"></div>
        </div>
    </div>

    <div id="inputModal"><div class="modal-content">
        <h3>Додати їжу</h3>
        <button class="neu-btn" style="width:100%; background:var(--accent); color:#fff; margin-bottom:10px;" onclick="document.getElementById('fIn').click()">📸 Фото</button>
        <textarea id="textFood" style="width:100%; height:80px; padding:10px; border-radius:10px;" placeholder="Введіть назву..."></textarea>
        <div style="display:flex; gap:10px; margin-top:15px;"><button class="neu-btn" style="flex:1" onclick="closeModal('inputModal')">Назад</button><button class="neu-btn" style="flex:1; background:var(--blue); color:#fff;" onclick="doAnalyze()">Аналіз</button></div>
    </div></div>

    <div id="confirmModal"><div class="modal-content">
        <h3>Перевірка</h3>
        <input id="en"> <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">
        <input id="ek" type="number"> <input id="ep" type="number">
        <input id="ef" type="number"> <input id="ec" type="number">
        <input id="esugar" type="number"> <input id="esalt" type="number">
        </div><button class="neu-btn" style="width:100%; background:var(--accent); color:#fff; margin-top:15px;" onclick="finalSave()">Зберегти</button>
    </div></div>

    <input type="file" id="fIn" style="display:none" onchange="doAnalyze()">

    <script>
        const tg = window.Telegram.WebApp;
        const uid = tg.initDataUnsafe.user?.id || "test_user";
        const API = "https://fitness-app-production-b4a3.up.railway.app";
        let selectedDate = new Date().toISOString().split('T')[0], activeMeal = "";

        function toggleMeal(mt) {
            const el = document.getElementById('det_'+mt);
            el.style.display = el.style.display === 'block' ? 'none' : 'block';
        }

        async function load() {
            const r = await fetch(`${API}/stats?user_id=${uid}&date=${selectedDate}`);
            const d = await r.json();
            
            // Оновлення головного кола
            const budget = d.norms.kcal + d.burned;
            document.getElementById('kcal_left').innerText = Math.max(0, budget - d.kcal);
            document.getElementById('main_kcal_ring').style.strokeDashoffset = 440 - (440 * Math.min(1, d.kcal/budget));
            document.getElementById('w_head').innerText = d.weight + " кг";

            // Оновлення кілець БЖВ
            const upRing = (id, vId, val, norm) => {
                const pct = Math.min(1, val/norm);
                document.getElementById(id).style.strokeDashoffset = 220 - (220 * pct);
                document.getElementById(vId).innerText = Math.round(val);
            };
            upRing('r_p', 'v_p', d.p, d.norms.p);
            upRing('r_f', 'v_f', d.f, d.norms.f);
            upRing('r_c', 'v_c', d.c, d.norms.c);
            upRing('r_sugar', 'v_sugar', d.sugar, d.norms.sugar);
            upRing('r_salt', 'v_salt', d.salt, d.norms.salt);
            upRing('r_water', 'v_water', d.water, 2.5);

            // Рендер деталей категорій
            for (let mt in d.meals) {
                const m = d.meals[mt];
                document.getElementById('kcal_'+mt).innerText = m.kcal;
                const det = document.getElementById('det_'+mt);
                det.innerHTML = `<div style="font-size:12px; margin-bottom:10px; color:var(--blue);">Б: ${Math.round(m.p)}г | Ж: ${Math.round(m.f)}г | В: ${Math.round(m.c)}г | Цук: ${Math.round(m.sugar)}г</div>`;
                m.items.forEach(i => {
                    det.innerHTML += `<div class="food-row"><span>${i.name}</span><b>${i.kcal} ккал</b></div>`;
                });
            }
        }

        function openAdd(mt) { 
            activeMeal = mt; 
            document.getElementById('textFood').value = ""; 
            document.getElementById('fIn').value = "";
            document.getElementById('inputModal').style.display = 'flex'; 
        }

        async function doAnalyze() {
            tg.MainButton.setText("ШІ Аналізує...").show();
            const fd = new FormData();
            if(document.getElementById('fIn').files[0]) fd.append('file', document.getElementById('fIn').files[0]);
            if(document.getElementById('textFood').value) fd.append('text_input', document.getElementById('textFood').value);
            
            const r = await fetch(`${API}/analyze`, {method:'POST', body:fd});
            const res = await r.json();
            
            document.getElementById('en').value = res.name;
            document.getElementById('ek').value = res.kcal;
            document.getElementById('ep').value = res.p;
            document.getElementById('ef').value = res.f;
            document.getElementById('ec').value = res.c;
            document.getElementById('esugar').value = res.sugar;
            document.getElementById('esalt').value = res.salt;
            
            tg.MainButton.hide();
            document.getElementById('inputModal').style.display='none';
            document.getElementById('confirmModal').style.display='flex';
        }

        async function finalSave() {
            const data = {
                user_id: uid, date: selectedDate, meal_type: activeMeal,
                name: document.getElementById('en').value, kcal: document.getElementById('ek').value,
                p: document.getElementById('ep').value, f: document.getElementById('ef').value,
                c: document.getElementById('ec').value, sugar: document.getElementById('esugar').value, salt: document.getElementById('esalt').value
            };
            await fetch(`${API}/save_food`, {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(data)});
            document.getElementById('confirmModal').style.display='none';
            load();
        }

        function closeModal(id) { document.getElementById(id).style.display='none'; }
        load(); tg.expand();
    </script>
</body>
</html>
