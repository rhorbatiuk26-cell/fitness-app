<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>FitLio Pro</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --bg: #f8fafc; --card: #ffffff; --accent: #10b981; --indigo: #6366f1; --blue: #3b82f6; --text: #1e293b; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 15px; padding-bottom: 90px; }
        
        /* ГАРНИЙ КАЛЕНДАР */
        .calendar-nav { display: flex; justify-content: space-between; align-items: center; background: white; padding: 12px 18px; border-radius: 22px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 15px; }
        .calendar-nav input { border: none; font-size: 16px; font-weight: 800; color: var(--indigo); cursor: pointer; background: transparent; text-align: center; width: 120px; }
        .nav-arrow { font-size: 24px; color: var(--indigo); cursor: pointer; user-select: none; }

        .neu-card { background: var(--card); border-radius: 30px; padding: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.03); margin-bottom: 15px; text-align: center; }
        .macro-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 15px; }
        .ring-box { position: relative; width: 100%; }
        .ring-box svg { transform: rotate(-90deg); width: 80px; height: 80px; }
        circle { fill: none; stroke-width: 7; stroke-linecap: round; }
        .ring-label { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; pointer-events: none; }
        .ring-label b { font-size: 13px; }
        .ring-label small { font-size: 8px; color: #64748b; font-weight: bold; }

        .meal-card { background: white; border-radius: 20px; padding: 16px; margin-bottom: 10px; border: 1px solid #f1f5f9; }
        .meal-header { display: flex; justify-content: space-between; align-items: center; }
        .btn-plus { background: #eff6ff; color: var(--blue); border: none; width: 36px; height: 36px; border-radius: 12px; font-size: 22px; font-weight: bold; cursor: pointer; }
        
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.4); backdrop-filter: blur(10px); display: none; align-items: center; justify-content: center; z-index: 1000; }
        .modal-content { width: 85%; background: white; padding: 25px; border-radius: 32px; box-shadow: 0 20px 50px rgba(0,0,0,0.1); }
        .btn-main { background: var(--accent); color: white; border: none; padding: 15px; border-radius: 18px; width: 100%; font-weight: 700; margin-top: 10px; cursor: pointer; }
        .food-item { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #f1f5f9; font-size: 14px; }
        .copy-btn { font-size: 12px; color: var(--indigo); text-decoration: underline; cursor: pointer; margin-bottom: 15px; display: block; text-align: center; }
    </style>
</head>
<body>

    <div class="calendar-nav">
        <span class="nav-arrow" onclick="changeDay(-1)">‹</span>
        <input type="date" id="datePicker" onchange="load()">
        <span class="nav-arrow" onclick="changeDay(1)">›</span>
    </div>

    <span class="copy-btn" onclick="copyPrev()">👯 Копіювати вчорашній день</span>

    <div class="neu-card">
        <div style="position:relative; display:inline-block;">
            <svg width="140" height="140" viewBox="0 0 160 160" style="transform: rotate(-90deg);">
                <circle stroke="#f1f5f9" stroke-width="12" cx="80" cy="80" r="72"></circle>
                <circle id="m_ring" stroke="var(--accent)" stroke-width="12" stroke-dasharray="452" cx="80" cy="80" r="72"></circle>
            </svg>
            <div style="position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);">
                <h2 id="k_left" style="margin:0; font-size:28px;">0</h2><small>залишилось</small>
            </div>
        </div>
        <div class="macro-grid">
            <div class="ring-box"><svg viewBox="0 0 80 80"><circle stroke="#f1f5f9" cx="40" cy="40" r="36"></circle><circle id="r_p" stroke="var(--accent)" cx="40" cy="40" r="36"></circle></svg><div class="ring-label"><b id="v_p">0</b><small>БІЛКИ</small></div></div>
            <div class="ring-box"><svg viewBox="0 0 80 80"><circle stroke="#f1f5f9" cx="40" cy="40" r="36"></circle><circle id="r_f" stroke="#f59e0b" cx="40" cy="40" r="36"></circle></svg><div class="ring-label"><b id="v_f">0</b><small>ЖИРИ</small></div></div>
            <div class="ring-box"><svg viewBox="0 0 80 80"><circle stroke="#f1f5f9" cx="40" cy="40" r="36"></circle><circle id="r_c" stroke="var(--blue)" cx="40" cy="40" r="36"></circle></svg><div class="ring-label"><b id="v_c">0</b><small>ВУГЛЕВ</small></div></div>
        </div>
    </div>

    <div id="meals_list">
        <div class="meal-card" onclick="toggleM('Breakfast')"><div class="meal-header"><b>🍳 Сніданок</b> <span id="k_Breakfast">0</span> <button class="btn-plus" onclick="event.stopPropagation(); openAdd('Breakfast')">+</button></div><div id="det_Breakfast" style="display:none; margin-top:10px;"></div></div>
        <div class="meal-card" onclick="toggleM('Snack1')"><div class="meal-header"><b>🍎 Перекус 1</b> <span id="k_Snack1">0</span> <button class="btn-plus" onclick="event.stopPropagation(); openAdd('Snack1')">+</button></div><div id="det_Snack1" style="display:none; margin-top:10px;"></div></div>
        <div class="meal-card" onclick="toggleM('Lunch')"><div class="meal-header"><b>🍲 Обід</b> <span id="k_Lunch">0</span> <button class="btn-plus" onclick="event.stopPropagation(); openAdd('Lunch')">+</button></div><div id="det_Lunch" style="display:none; margin-top:10px;"></div></div>
        <div class="meal-card" onclick="toggleM('Snack2')"><div class="meal-header"><b>🍌 Перекус 2</b> <span id="k_Snack2">0</span> <button class="btn-plus" onclick="event.stopPropagation(); openAdd('Snack2')">+</button></div><div id="det_Snack2" style="display:none; margin-top:10px;"></div></div>
        <div class="meal-card" onclick="toggleM('Dinner')"><div class="meal-header"><b>🥗 Вечеря</b> <span id="k_Dinner">0</span> <button class="btn-plus" onclick="event.stopPropagation(); openAdd('Dinner')">+</button></div><div id="det_Dinner" style="display:none; margin-top:10px;"></div></div>
    </div>

    <div id="profileModal" class="modal"><div class="modal-content"><h3>Налаштування</h3><input id="p_w" type="number" placeholder="Вага кг"><input id="p_kcal" type="number" placeholder="Ціль Ккал"><button class="btn-main" onclick="saveProfile()">Зберегти</button></div></div>
    <div id="weightModal" class="modal"><div class="modal-content"><h3>⚖️ Новий тиждень!</h3><p>Оновіть вашу вагу:</p><input id="newW" type="number"><button class="btn-main" onclick="saveWeeklyW()">Зберегти вагу</button></div></div>
    <div id="addModal" class="modal"><div class="modal-content"><h3>Додати їжу</h3><button class="btn-main" onclick="document.getElementById('fIn').click()">📸 Зробити фото</button><textarea id="tIn" placeholder="Що ви з'їли?"></textarea><button class="btn-main" style="background:var(--indigo)" onclick="doAnalyze()">ШІ Аналіз</button></div></div>
    <div id="confirmModal" class="modal"><div class="modal-content"><h3>Підтвердити</h3><input id="resN"><input id="resK" type="number"><button class="btn-main" onclick="finalSave()">Записати в щоденник</button></div></div>

    <input type="file" id="fIn" style="display:none" onchange="doAnalyze()">

    <script>
        const tg = window.Telegram.WebApp; const uid = tg.initDataUnsafe.user?.id || "test_user";
        const API = "https://fitness-app-production-b4a3.up.railway.app";
        let activeM = "";

        document.getElementById('datePicker').value = new Date().toISOString().split('T')[0];

        async function load() {
            const date = document.getElementById('datePicker').value;
            const r = await fetch(`${API}/stats?user_id=${uid}&date=${date}`);
            const d = await r.json();
            
            if(!d.profile) openModal('profileModal');
            if(d.needs_weight) openModal('weightModal');

            document.getElementById('k_left').innerText = Math.max(0, d.norms.kcal - d.kcal);
            document.getElementById('m_ring').style.strokeDashoffset = 452 - (452 * Math.min(1, d.kcal/d.norms.kcal));
            
            ["Breakfast","Snack1","Lunch","Snack2","Dinner"].forEach(m => {
                document.getElementById('k_'+m).innerText = d.meals[m].kcal;
                document.getElementById('det_'+m).innerHTML = d.meals[m].list.map(i => `
                    <div class="food-item"><span>${i.name} (${i.kcal} ккал)</span><span onclick="delF(${i.id})" style="color:red">🗑️</span></div>
                `).join('');
            });
        }

        function changeDay(delta) {
            let d = new Date(document.getElementById('datePicker').value);
            d.setDate(d.getDate() + delta);
            document.getElementById('datePicker').value = d.toISOString().split('T')[0];
            load();
        }

        async function copyPrev() {
            if(!confirm("Скопіювати вчорашній раціон?")) return;
            await fetch(`${API}/copy_previous?user_id=${uid}&date=${document.getElementById('datePicker').value}`, {method:'POST'});
            load();
        }

        async function saveProfile() {
            await fetch(`${API}/save_profile`, {method:'POST', headers:{'Content-Type':'application/json'}, 
                body:JSON.stringify({user_id:uid, weight:document.getElementById('p_w').value, c_kcal:document.getElementById('p_kcal').value})});
            closeModal('profileModal'); load();
        }

        async function saveWeeklyW() {
            await fetch(`${API}/save_profile`, {method:'POST', headers:{'Content-Type':'application/json'}, 
                body:JSON.stringify({user_id:uid, weight:document.getElementById('newW').value, c_kcal:2000})});
            closeModal('weightModal'); load();
        }

        async function doAnalyze() {
            const fd = new FormData();
            if(document.getElementById('fIn').files[0]) fd.append('file', document.getElementById('fIn').files[0]);
            if(document.getElementById('tIn').value) fd.append('text_input', document.getElementById('tIn').value);
            const r = await fetch(`${API}/analyze`, {method:'POST', body:fd});
            const res = await r.json();
            document.getElementById('resN').value = res.name; document.getElementById('resK').value = res.kcal;
            closeModal('addModal'); openModal('confirmModal');
        }

        async function finalSave() {
            await fetch(`${API}/confirm_save`, {method:'POST', headers:{'Content-Type':'application/json'}, 
                body:JSON.stringify({user_id:uid, date:document.getElementById('datePicker').value, meal_type:activeM, name:document.getElementById('resN').value, kcal:document.getElementById('resK').value})});
            closeModal('confirmModal'); load();
        }

        async function delF(id) { if(confirm("Видалити запис?")) { await fetch(`${API}/delete_food/${id}`, {method:'DELETE'}); load(); } }
        function toggleM(m) { const el = document.getElementById('det_'+m); el.style.display = el.style.display === 'none' ? 'block' : 'none'; }
        function openModal(id) { document.getElementById(id).style.display = 'flex'; }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }
        function openAdd(m) { activeM = m; openModal('addModal'); }

        load(); tg.expand();
    </script>
</body>
</html>
