<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>FitLio AI</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg: #0f1215;
            --card: #1c1f26;
            --accent: #34c759;
            --text: #ffffff;
        }
        body {
            font-family: -apple-system, system-ui;
            background: var(--bg); color: var(--text);
            margin: 0; padding: 20px;
            display: flex; flex-direction: column; align-items: center;
        }
        .progress-box {
            position: relative; width: 200px; height: 200px; margin: 20px 0;
        }
        svg { transform: rotate(-90deg); width: 200px; height: 200px; }
        circle { fill: none; stroke-width: 12; stroke-linecap: round; transition: 0.5s; }
        .bg-circle { stroke: #2c2f36; }
        .bar-circle { stroke: var(--accent); stroke-dasharray: 565; stroke-dashoffset: 565; }
        .info {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            text-align: center;
        }
        .kcal-num { font-size: 36px; font-weight: bold; }
        .history {
            width: 100%; max-width: 400px; background: var(--card);
            border-radius: 20px; padding: 15px; margin-bottom: 100px;
        }
        .item {
            padding: 12px 0; border-bottom: 1px solid #2c2f36;
            white-space: pre-wrap; font-size: 14px; line-height: 1.5;
        }
        .scan-container {
            position: fixed; bottom: 20px; width: calc(100% - 40px);
        }
        .btn {
            background: var(--accent); color: white; padding: 18px;
            border-radius: 35px; text-align: center; font-weight: bold;
            box-shadow: 0 5px 15px rgba(52,199,89,0.3); cursor: pointer;
        }
        input { display: none; }
    </style>
</head>
<body>
    <div style="opacity: 0.6;">Сьогодні спожито</div>
    <div class="progress-box">
        <svg><circle class="bg-circle" cx="100" cy="100" r="90"></circle>
             <circle id="bar" class="bar-circle" cx="100" cy="100" r="90"></circle></svg>
        <div class="info">
            <div id="totalKcal" class="kcal-num">0</div>
            <div style="opacity: 0.5;">з 2000</div>
        </div>
    </div>

    <div class="history">
        <div style="font-weight: bold; margin-bottom: 10px;">Історія за день</div>
        <div id="list"></div>
    </div>

    <div class="scan-container">
        <label for="file" class="btn">📸 СКАНУВАТИ СТРАВУ</label>
        <input type="file" id="file" accept="image/*" onchange="upload()">
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        const uid = tg.initDataUnsafe.user?.id || "test_user";
        const API = "https://fitness-app-production-b4a3.up.railway.app"; // ЗАМІНИ НА СВОЮ

        async function loadStats() {
            const r = await fetch(`${API}/stats?user_id=${uid}`);
            const d = await r.json();
            document.getElementById('totalKcal').innerText = d.total;
            
            const offset = 565 - (565 * d.total / 2000);
            document.getElementById('bar').style.strokeDashoffset = Math.max(0, offset);
            
            document.getElementById('list').innerHTML = d.history.map(h => 
                `<div class="item">${h.info}</div>`).reverse().join('') || "Поки порожньо";
        }

        async function upload() {
            const file = document.getElementById('file').files[0];
            const btn = document.querySelector('.btn');
            btn.innerText = "⏳ АНАЛІЗУЮ...";
            
            const fd = new FormData();
            fd.append('file', file);
            
            await fetch(`${API}/analyze?user_id=${uid}`, { method: 'POST', body: fd });
            btn.innerText = "📸 СКАНУВАТИ СТРАВУ";
            loadStats();
        }

        loadStats();
        tg.expand();
    </script>
</body>
</html>
