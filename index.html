<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>FitLio AI Pro</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --bg: #f2f4f7; --card: #ffffff; --text: #1c1c1e; --accent: #34c759; --water: #007aff; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 15px 15px 110px; }
        .main-card { background: var(--card); border-radius: 30px; padding: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); text-align: center; margin-bottom: 15px; }
        .progress-circle { position: relative; width: 160px; height: 160px; margin: 0 auto 15px; }
        svg { transform: rotate(-90deg); width: 160px; height: 160px; }
        circle { fill: none; stroke-width: 14; stroke-linecap: round; transition: 1s; }
        .bg-c { stroke: #eee; }
        .bar-c { stroke: var(--accent); stroke-dasharray: 440; stroke-dashoffset: 440; }
        .macros { display: flex; justify-content: space-around; margin-top: 15px; font-size: 14px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .btn-card { background: var(--card); border-radius: 20px; padding: 20px; text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,0.03); cursor: pointer; }
        #chatModal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 1000; display: none; flex-direction: column; }
        .chat-msgs { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .msg { padding: 10px 15px; border-radius: 18px; max-width: 80%; font-size: 14px; }
        .msg.user { background: #e1ffeb; align-self: flex-end; }
        .msg.bot { background: #f0f0f0; align-self: flex-start; }
        .chat-input { padding: 15px; border-top: 1px solid #eee; display: flex; gap: 10px; }
        input[type="text"] { flex: 1; padding: 12px; border: 1px solid #ddd; border-radius: 12px; outline: none; }
        .send-btn { background: var(--accent); color: white; width: 45px; height: 45px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; }
        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; padding: 20px; background: rgba(242,244,247,0.9); backdrop-filter: blur(10px); }
        .scan-btn { background: #1c1c1e; color: white; padding: 18px; border-radius: 22px; text-align: center; font-weight: bold; }
    </style>
</head>
<body>

    <div class="main-card">
        <div class="progress-circle">
            <svg><circle class="bg-c" cx="80" cy="80" r="70"></circle>
                 <circle id="bar" class="bar-c" cx="80" cy="80" r="70"></circle></svg>
            <div style="position: absolute; top:50%; left:50%; transform:translate(-50%,-50%);">
                <div id="kcal" style="font-size: 32px; font-weight: 800;">0</div>
                <div style="font-size: 10px; color: #888;">ккал сьогодні</div>
            </div>
        </div>
        <div class="macros">
            <div><b id="p" style="color:#ff9500">0г</b><br><small>Білки</small></div>
            <div><b id="f" style="color:#ffcc00">0г</b><br><small>Жири</small></div>
            <div><b id="c" style="color:#5856d6">0г</b><br><small>Вугл</small></div>
        </div>
    </div>

    <div class="grid">
        <div class="btn-card" style="grid-column: span 2; background: #34c759; color: white; font-weight: bold;">📈 Мій прогрес</div>
        <div class="btn-card" onclick="addWater()">💧<br><b>+250 мл</b><br><small id="w">0л</small></div>
        <div class="btn-card" onclick="toggleChat(true)">💬<br><b>Чат з ШІ</b></div>
    </div>

    <div id="chatModal">
        <div style="padding: 20px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between;">
            <b>Тренер FitLio</b> <span onclick="toggleChat(false)" style="color:#888; font-size: 20px;">✕</span>
        </div>
        <div id="chatMsgs" class="chat-msgs"></div>
        <div class="chat-input">
            <input type="text" id="chatInput" placeholder="Напишіть тренеру...">
            <div class="send-btn" onclick="sendMsg()">➔</div>
        </div>
    </div>

    <div class="bottom-nav">
        <label for="file" class="scan-btn">📸 СКАНУВАТИ СТРАВУ</label>
        <input type="file" id="file" accept="image/*" style="display:none" onchange="upload()">
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        const uid = tg.initDataUnsafe.user?.id || "test_user";
        
        // ВАЖЛИВО: Твоє посилання Railway без слеша в кінці
        const API = "https://fitness-app-production-b4a3.up.railway.app"; 

        async function load() {
            try {
                const r = await fetch(`${API}/stats?user_id=${uid}`);
                const d = await r.json();
                document.getElementById('kcal').innerText = d.kcal;
                document.getElementById('p').innerText = d.p+'г';
                document.getElementById('f').innerText = d.f+'г';
                document.getElementById('c').innerText = d.c+'г';
                document.getElementById('w').innerText = d.water+'л';
                const offset = 440 - (440 * d.kcal / 2100);
                document.getElementById('bar').style.strokeDashoffset = Math.max(0, offset);
            } catch(e) { console.error("Stats load error"); }
        }

        async function addWater() {
            await fetch(`${API}/add_water?user_id=${uid}&amount=0.25`, {method:'POST'});
            tg.HapticFeedback.impactOccurred('light');
            load();
        }

        async function upload() {
            const fileInput = document.getElementById('file');
            if(!fileInput.files[0]) return;
            const fd = new FormData();
            fd.append('file', fileInput.files[0]);
            document.querySelector('.scan-btn').innerText = "⏳ АНАЛІЗУЮ...";
            try {
                const r = await fetch(`${API}/analyze?user_id=${uid}`, {method:'POST', body:fd});
                const res = await r.json();
                if(res.error) alert(res.error);
                load();
            } catch(e) { alert("Помилка зв'язку з сервером."); }
            document.querySelector('.scan-btn').innerText = "📸 СКАНУВАТИ СТРАВУ";
        }

        function toggleChat(s) { document.getElementById('chatModal').style.display = s?'flex':'none'; }

        async function sendMsg() {
            const inp = document.getElementById('chatInput');
            const box = document.getElementById('chatMsgs');
            if(!inp.value.trim()) return;
            const msg = inp.value;
            box.innerHTML += `<div class="msg user">${msg}</div>`;
            inp.value = "";
            box.scrollTop = box.scrollHeight;

            const tempId = "bot_"+Date.now();
            box.innerHTML += `<div class="msg bot" id="${tempId}">⏳...</div>`;

            try {
                const r = await fetch(`${API}/chat?user_id=${uid}&message=${encodeURIComponent(msg)}`, {method:'POST'});
                const d = await r.json();
                document.getElementById(tempId).innerText = d.reply;
            } catch(e) { document.getElementById(tempId).innerText = "Помилка чату."; }
            box.scrollTop = box.scrollHeight;
        }

        load();
        tg.expand();
    </script>
</body>
</html>
