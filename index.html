<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>FitLio Pro</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --bg: #f8fafc; --card: #ffffff; --accent: #10b981; --blue: #3b82f6; --pink: #ec4899; --indigo: #6366f1; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); margin: 0; padding: 15px; color: #1e293b; }
        .neu-card { background: var(--card); border-radius: 28px; padding: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.04); margin-bottom: 15px; }
        .macro-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-top: 20px; }
        .ring-box { position: relative; width: 85px; height: 85px; margin: 0 auto; text-align: center; }
        .ring-box svg { transform: rotate(-90deg); width: 85px; height: 85px; }
        circle { fill: none; stroke-width: 6; stroke-linecap: round; }
        .ring-fg { stroke-dasharray: 226; stroke-dashoffset: 226; transition: 0.6s ease; }
        .ring-label { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .ring-label b { font-size: 13px; }
        .ring-label small { font-size: 9px; color: #64748b; }
        .water-btn { background: #e0f2fe; color: #0369a1; border: 1px solid #bae6fd; padding: 15px; border-radius: 20px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; margin-bottom: 15px; font-weight: bold; width: 100%; box-sizing: border-box; }
        .meal-card { background: #fff; border-radius: 20px; padding: 15px; margin-bottom: 10px; border: 1px solid #f1f5f9; }
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: none; align-items: center; justify-content: center; z-index: 1000; backdrop-filter: blur(4px); }
        .modal-content { width: 90%; background: #fff; padding: 25px; border-radius: 30px; }
        .btn { border: none; border-radius: 12px; padding: 12px; font-weight: bold; cursor: pointer; width: 100%; margin-top: 10px; }
        input { width: 100%; padding: 10px; margin-top: 5px; border: 1px solid #eee; border-radius: 8px; box-sizing: border-box; }
    </style>
</head>
<body>

    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
        <h2 style="margin:0;">Мій Прогрес</h2>
        <button style="background:none; border:none; font-size:20px;" onclick="openModal('profileModal')">⚙️</button>
    </div>

    <div class="neu-card">
        <div style="text-align:center; position:relative;">
            <svg width="140" height="140" viewBox="0 0 160 160" style="transform: rotate(-90deg);">
                <circle stroke="#f1f5f9" stroke-width="10" cx="80" cy="80" r="72"></circle>
                <circle id="m_ring" stroke="var(--accent)" stroke-width="10" stroke-dasharray="452" stroke-dashoffset="452" cx="80" cy="80" r="72"></circle>
            </svg>
            <div style="position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);">
                <h1 id="k_left" style="margin:0;">0</h1><small id="k_norm">з 2000</small>
            </div>
        </div>

        <div class="macro-grid">
            <div class="ring-box"><svg viewBox="0 0 80 80"><circle stroke="#f1f5f9" cx="40" cy="40" r="36"></circle><circle id="r_p" class="ring-fg" stroke="var(--accent)" cx="40" cy="40" r="36"></circle></svg><div class="ring-label"><b id="v_p">0</b><small id="n_p">/120</small><small>БІЛОК</small></div></div>
            <div class="ring-box"><svg viewBox="0 0 80 80"><circle stroke="#f1f5f9" cx="40" cy="40" r="36"></circle><circle id="r_f" class="ring-fg" stroke="#f59e0b" cx="40" cy="40" r="36"></circle></svg><div class="ring-label"><b id="v_f">0</b><small id="n_f">/70</small><small>ЖИРИ</small></div></div>
            <div class="ring-box"><svg viewBox="0 0 80 80"><circle stroke="#f1f5f9" cx="40" cy="40" r="36"></circle><circle id="r_c" class="ring-fg" stroke="var(--blue)" cx="40" cy="40" r="36"></circle></svg><div class="ring-label"><b id="v_c">0</b><small id="n_c">/250</small><small>ВУГЛ</small></div></div>
            <div class="ring-box"><svg viewBox="0 0 80 80"><circle stroke="#f1f5f9" cx="40" cy="40" r="36"></circle><circle id="r_sugar" class="ring-fg" stroke="var(--pink)" cx="40" cy="40" r="36"></circle></svg><div class="ring-label"><b id="v_sugar">0</b><small id="n_sugar">/50</small><small>ЦУКОР</small></div></div>
            <div class="ring-box"><svg viewBox="0 0 80 80"><circle stroke="#f1f5f9" cx="40" cy="40" r="36"></circle><circle id="r_salt" class="ring-fg" stroke="var(--indigo)" cx="40" cy="40" r="36"></circle></svg><div class="ring-label"><b id="v_salt">0</b><small id="n_salt">/5</small><small>СІЛЬ</small></div></div>
            <div class="ring-box"><svg viewBox="0 0 80 80"><circle stroke="#f1f5f9" cx="40" cy="40" r="36"></circle><circle id="r_water" class="ring-fg" stroke="#0ea5e9" cx="40" cy="40" r="36"></circle></svg><div class="ring-label"><b id="v_water">0</b><small id="n_water">/2.5</small><small>ВОДА</small></div></div>
        </div>
    </div>

    <button class="water-btn" onclick="addWater()">
        <span>💧 Додати воду</span>
        <span id="w_val">0 / 2.5 л</span>
    </button>

    <div id="meals">
        <div class="meal-card" onclick="openAdd('Breakfast')"><b>🍳 Сніданок</b> <span style="float:right;"><span id="k_Breakfast">0</span> ккал +</span></div>
        <div class="meal-card" onclick="openAdd('Lunch')"><b>🍲 Обід</b> <span style="float:right;"><span id="k_Lunch">0</span> ккал +</span></div>
        <div class="meal-card" onclick="openAdd('Dinner')"><b>🥗 Вечеря</b> <span style="float:right;"><span id="k_Dinner">0</span> ккал +</span></div>
    </div>

    <div id="inputModal" class="modal"><div class="modal-content">
        <h3>Додати страву</h3>
        <button class="btn" style="background:var(--accent); color:#fff;" onclick="document.getElementById('fIn').click()">📸 Фото / Текст</button>
        <textarea id="tFood" style="width:100%; height:60px; margin-top:10px;" placeholder="Що ви з'їли?"></textarea>
        <button class="btn" style="background:var(--blue); color:#fff;" onclick="doAnalyze()">Аналіз</button>
        <button class="btn" onclick="closeModal('inputModal')">Назад</button>
    </div></div>

    <div id="confirmModal" class="modal"><div class="modal-content">
        <h3>Підтвердження</h3>
        <input id="en">
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">
            <input id="ek" type="number" placeholder="Ккал"> <input id="ep" type="number" placeholder="Б">
            <input id="ef" type="number" placeholder="Ж"> <input id="ec" type="number" placeholder="В">
            <input id="esu" type="number" placeholder="Цукор"> <input id="esa" type="number" placeholder="Сіль">
        </div>
        <button class="btn" style="background:var(--accent); color:#fff;" onclick="finalSave()">Зберегти</button>
    </div></div>

    <input type="file" id="fIn" style="display:none" onchange="doAnalyze()">

    <script>
        const tg = window.Telegram.WebApp;
        const uid = tg.initDataUnsafe.user?.id || "test_user";
        const API = "https://fitness-app-production-b4a3.up.railway.app";
        let selectedDate = new Date().toISOString().split('T')[0], activeMeal = "";

        async function load() {
            const r = await fetch(`${API}/stats?user_id=${uid}&date=${selectedDate}`);
            const d = await r.json();
            
            document.getElementById('k_left').innerText = Math.max(0, d.norms.kcal - d.kcal);
            document.getElementById('k_norm').innerText = `з ${d.norms.kcal}`;
            document.getElementById('m_ring').style.strokeDashoffset = 452 - (452 * Math.min(1, d.kcal/d.norms.kcal));

            const upR = (id, vId, nId, v, n) => {
                document.getElementById(id).style.strokeDashoffset = 226 - (226 * Math.min(1, v/n));
                document.getElementById(vId).innerText = Math.round(v);
                document.getElementById(nId).innerText = `/${n}`;
                document.getElementById(vId).style.color = v > n ? 'red' : 'inherit';
            };

            upR('r_p','v_p','n_p', d.p, d.norms.p); 
            upR('r_f','v_f','n_f', d.f, d.norms.f); 
            upR('r_c','v_c','n_c', d.c, d.norms.c);
            upR('r_sugar','v_sugar','n_sugar', d.sugar, d.norms.sugar); 
            upR('r_salt','v_salt','n_salt', d.salt, d.norms.salt); 
            upR('r_water','v_water','n_water', d.water, 2.5);
            
            document.getElementById('w_val').innerText = `${d.water} / 2.5 л`;
            for (let mt in d.meals) document.getElementById('k_'+mt).innerText = d.meals[mt].kcal;
        }

        function openAdd(mt) { activeMeal=mt; openModal('inputModal'); }
        async function doAnalyze() {
            const fd = new FormData();
            if(document.getElementById('fIn').files[0]) fd.append('file', document.getElementById('fIn').files[0]);
            fd.append('text_input', document.getElementById('tFood').value);
            const r = await fetch(`${API}/analyze`, {method:'POST', body:fd});
            const res = await r.json();
            document.getElementById('en').value=res.name; document.getElementById('ek').value=res.kcal; 
            document.getElementById('ep').value=res.p; document.getElementById('ef').value=res.f; 
            document.getElementById('ec').value=res.c; document.getElementById('esu').value=res.sugar; document.getElementById('esa').value=res.salt;
            closeModal('inputModal'); openModal('confirmModal');
        }

        async function finalSave() {
            const data = { 
                user_id: uid, date: selectedDate, meal_type: activeMeal, 
                name: document.getElementById('en').value, kcal: document.getElementById('ek').value, 
                p: document.getElementById('ep').value, f: document.getElementById('ef').value, 
                c: document.getElementById('ec').value, sugar: document.getElementById('esu').value || 0, 
                salt: document.getElementById('esa').value || 0 
            };
            await fetch(`${API}/confirm_save`, {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(data)});
            closeModal('confirmModal'); load();
        }

        async function addWater() { await fetch(`${API}/add_water?user_id=${uid}&date=${selectedDate}&amount=0.25`, {method:'POST'}); load(); }
        function openModal(id) { document.getElementById(id).style.display='flex'; }
        function closeModal(id) { document.getElementById(id).style.display='none'; }
        
        load(); tg.expand();
    </script>
</body>
</html>
