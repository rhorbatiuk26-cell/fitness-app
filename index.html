<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Fitness AI Coach</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-color: #1a1d21;
            --text-color: #ffffff;
            --accent-color: #34c759; /* Зелений для прогресу */
            --card-bg: rgba(255, 255, 255, 0.05);
            --border-color: rgba(255, 255, 255, 0.1);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
        }

        /* Кільце прогресу */
        .progress-container {
            position: relative;
            width: 180px;
            height: 180px;
            margin: 20px 0;
        }

        .progress-circle {
            transform: rotate(-90deg);
            width: 100%;
            height: 100%;
        }

        .progress-circle-bg {
            fill: none;
            stroke: var(--card-bg);
            stroke-width: 12;
        }

        .progress-circle-bar {
            fill: none;
            stroke: var(--accent-color);
            stroke-width: 12;
            stroke-linecap: round;
            stroke-dasharray: 471; /* 2 * PI * R (75) */
            stroke-dashoffset: 471;
            transition: stroke-dashoffset 0.5s ease-out;
        }

        .progress-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
        }

        .current-kcal { font-size: 32px; font-weight: bold; }
        .total-kcal { font-size: 16px; color: rgba(255,255,255,0.6); }

        /* Картка історії */
        .history-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            width: 100%;
            max-width: 400px;
            backdrop-filter: blur(10px);
            padding: 16px;
            margin-bottom: 80px; /* Місце для кнопки */
        }

        .history-header {
            font-size: 18px; font-weight: 600;
            margin-bottom: 12px;
            display: flex; justify-content: space-between;
        }

        .history-list {
            list-style: none; padding: 0; margin: 0;
            max-height: 200px; overflow-y: auto;
        }

        .history-item {
            display: flex; justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid var(--border-color);
        }
        .history-item:last-child { border-bottom: none; }

        /* Кнопка сканування (фіксована знизу) */
        .scan-btn-container {
            position: fixed;
            bottom: 16px;
            left: 16px; right: 16px;
            display: flex; justify-content: center;
        }

        .scan-label {
            background-color: var(--accent-color);
            color: white;
            padding: 16px 32px;
            border-radius: 30px;
            font-size: 18px; font-weight: 600;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(52, 199, 89, 0.4);
            display: flex; align-items: center; gap: 8px;
            transition: transform 0.1s;
        }
        .scan-label:active { transform: scale(0.97); }
        
        input[type="file"] { display: none; } /* Ховаємо стандартний input */

    </style>
</head>
<body>

    <div style="font-size: 14px; color: rgba(255,255,255,0.6);">Сьогодні</div>
    
    <div class="progress-container">
        <svg class="progress-circle" viewBox="0 0 160 160">
            <circle class="progress-circle-bg" cx="80" cy="80" r="75"></circle>
            <circle class="progress-circle-bar" id="progressBar" cx="80" cy="80" r="75"></circle>
        </svg>
        <div class="progress-text">
            <div class="current-kcal" id="currKcal">0</div>
            <div class="total-kcal">/ 2000 ккал</div>
        </div>
    </div>

    <div class="history-card">
        <div class="history-header">
            <span>Історія їжі</span>
            <span id="foodCount" style="color: rgba(255,255,255,0.6);">0</span>
        </div>
        <ul class="history-list" id="res">
            <li class="history-item" style="color: rgba(255,255,255,0.4); justify-content: center;">Ще немає записів</li>
        </ul>
    </div>

    <div class="scan-btn-container">
        <label for="fileInput" class="scan-label">
            📷 Сканувати страву
        </label>
        <input type="file" id="fileInput" accept="image/*" onchange="scanFood()">
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand(); // Розгортаємо Mini App

        // --- ЛОГІКА ДИЗАЙНУ (Кільце) ---
        function setProgress(current, total) {
            const bar = document.getElementById('progressBar');
            const currText = document.getElementById('currKcal');
            currText.innerText = current;
            
            // Розрахунок заповнення кільця
            const maxOffset = 471; // 2 * PI * R (75)
            const progress = current / total;
            const newOffset = maxOffset * (1 - progress);
            
            // Якщо калорій більше норми, колір стає червоним
            if (current > total) {
                bar.style.stroke = "#ff3b30";
                bar.style.strokeDashoffset = 0; // Повне коло
            } else {
                bar.style.stroke = "#34c759"; // Стандартний зелений
                bar.style.strokeDashoffset = newOffset;
            }
        }

        // Тестове заповнення для перевірки дизайну
        // setProgress(540, 2000); // Спробуй розкоментувати і оновити

        // --- ЛОГІКА ШІ (Беремо зі старого коду) ---
        async function scanFood() {
            const fileInput = document.getElementById('fileInput');
            const resList = document.getElementById('res');
            const bar = document.getElementById('progressBar');
            
            if (fileInput.files.length === 0) return;
            
            // Показуємо завантаження
            bar.style.stroke = "#ff9500"; // Помаранчевий під час аналізу
            
            const fd = new FormData();
            fd.append('file', fileInput.files[0]);

            try {
                // ЗАМІНИ НА СВОЮ АДРЕСУ RAILWAY
                const r = await fetch('https://fitness-app-production-b4a3.up.railway.app/analyze', {
                    method: 'POST',
                    body: fd
                });
                const d = await r.json();
                
                // Оновлюємо список історії (проста анімація появи)
                resList.innerHTML = `<li class="history-item" style="animation: fadeIn 0.5s;">${d.result}</li>`;
                bar.style.stroke = "#34c759"; // Повертаємо зелений
                
                // P.S. Підключення до бази (`setProgress`) зробимо наступним кроком.
                
            } catch (err) {
                resList.innerHTML = `<li class="history-item" style="color: #ff3b30;">Помилка зв'язку.</li>`;
                bar.style.stroke = "#ff3b30"; // Червоний помилки
            }
        }
    </script>
</body>
</html>
