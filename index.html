<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>FitLio Pro</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --bg: #f8fafc; --accent: #10b981; --indigo: #6366f1; --blue: #3b82f6; --text: #1e293b; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); margin: 0; padding: 15px; color: var(--text); padding-bottom: 100px; }
        
        /* Екран привітання */
        #onboarding { position: fixed; inset: 0; background: white; z-index: 5000; padding: 30px; display: none; flex-direction: column; overflow-y: auto; }
        .input-group { margin-bottom: 15px; text-align: left; }
        .input-group label { display: block; font-size: 12px; margin-bottom: 5px; color: #64748b; }
        input, select { width: 100%; padding: 12px; border-radius: 12px; border: 1px solid #e2e8f0; box-sizing: border-box; }

        .calendar-nav { display: flex; justify-content: space-between; align-items: center; background: white; padding: 15px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 15px; }
        .calendar-nav input { border: none; font-size: 16px; font-weight: bold; color: var(--indigo); width: 130px; }

        .neu-card { background: white; border-radius: 30px; padding: 20px; box-shadow: 0 8px 25px rgba(0,0,0,0.03); margin-bottom: 15px; text-align: center; }
        .macro-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 15px; }
        .ring-box { position: relative; cursor: pointer; }
        .ring-box svg { transform: rotate(-90deg); width: 85px; height: 85px; }
        circle { fill: none; stroke-width: 8; stroke-linecap: round; transition: 0.5s; }
        .ring-label { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; pointer-events: none; }
        
        .water-btn { background: #eff6ff; color: var(--blue); padding: 15px; border-radius: 20px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #dbeafe; font-weight: bold; margin-bottom: 15px; }

        .meal-card { background: white; border-radius: 20px; padding: 18px; margin-bottom: 10px; border: 1px solid #f1f5f9; }
        .meal-header { display: flex; justify-content: space-between; align-items: center; font-weight: bold; }
        .btn-plus { background: #f0fdf4; color: var(--accent); border: none; width: 38px; height: 38px; border-radius: 12px; font-size: 24px; }

        /* Чат */
        .chat-btn { position: fixed; bottom: 25px; right: 25px; background: var(--indigo); color: white; width: 60px; height: 60px; border-radius: 30px; display: flex; align-items: center; justify-content: center; font-size: 28px; box-shadow: 0 8px 20px rgba(99,102,241,0.4); }
        #chatBox { position: fixed; bottom: 100px; right: 20px; width: 300px; height: 400px; background: white; border-radius: 20px; display: none; flex-direction: column; box-shadow: 0 10px 40px rgba(0,0,0,0.2); z-index: 4000; overflow: hidden; }

        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: none; align-items: center; justify-content: center; z-index: 6000; }
        .modal-content { width: 85%; background: white; padding: 25px; border-radius: 30px; }
        .btn-main { background: var(--accent); color: white; border: none; padding: 16px; border-radius: 15px; width: 100%; font-weight: bold; font-size: 16px; margin-top: 10px; }
    </style>
</head>
<body>

    <div id="onboarding">
        <h2 style="color:var(--indigo)">Привіт! Налаштуємо FitLio 🚀</h2>
        <p style="font-size:14px; color:#64748b">Вкажи дані, і ШІ розрахує твою норму.</p>
        <div class="input-group"><label>Стать</label><select id="reg_g"><option>Чоловік</option><option>Жінка</option></select></div>
        <div class="input-group"><label>Вік</label><input id="reg_a" type="number" placeholder="25"></div>
        <div class="input-group"><label>Вага (кг)</label><input id="reg_w" type="number" placeholder="75"></div>
        <div class="input-group"><label>Зріст (см)</label><input id="reg_h" type="number" placeholder="180"></div>
        <div class="input-group"><label>Активність</label><select id="reg_act"><option value="low">Сидяча</option><option value="mid">Помірна (1-3 тренування)</option><option value="high">Висока</option></select></div>
        <button class="btn-main" onclick="startSetup()">Розрахувати норму ШІ</button>
    </div>

    <div class="calendar-nav">
        <span onclick="changeDay(-1)">◀</span>
        <input type="date" id="datePicker" onchange="load()">
        <span onclick="changeDay(1)">▶</span>
    </div>

    <div class="neu-card">
        <div style="position:relative; display:inline-block;">
            <svg width="150" height="150" viewBox="0 0 160 160" style="transform: rotate(-90deg);">
                <circle stroke="#f1f5f9" stroke-width="12" cx="80" cy="80" r="72"></circle>
                <circle id="m_ring" stroke="var(--accent)" stroke-width="12" stroke-dasharray="452" cx="80" cy="80" r="72"></circle>
            </svg>
            <div style="position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);">
                <h2 id="k_left" style="margin:0; font-size:32px;">0</h2><small>залишилось</small>
            </div>
        </div>
        <div class="macro-grid">
            <div class="ring-box" onclick="tg.showAlert('Тут будуть деталі Б')"><svg viewBox="0 0 80 80"><circle stroke="#f1f5f9" cx="40" cy="40" r="36"></circle><circle id="r_p" stroke="var(--accent)" cx="40" cy="40" r="36"></circle></svg><div class="ring-label"><b id="v_p">0</b><small>Б</small></div></div>
            <div class="ring-box" onclick="tg.showAlert('Тут будуть деталі Ж')"><svg viewBox="0 0 80 80"><circle stroke="#f1f5f9" cx="40" cy="40" r="36"></circle><circle id="r_f" stroke="#f59e0b" cx="40" cy="40" r="36"></circle></svg><div class="ring-label"><b id="v_f">0</b><small>Ж</small></div></div>
            <div class="ring-box" onclick="tg.showAlert('Тут будуть деталі В')"><svg viewBox="0 0 80 80"><circle stroke="#f1f5f9" cx="40" cy="40" r="36"></circle><circle id="r_c" stroke="var(--blue)" cx="40" cy="40" r="36"></circle></svg><div class="ring-label"><b id="v_c">0</b><small>В</small></div></div>
        </div>
        <div style="margin-top:15px; font-size:13px; color:#64748b; border-top:1px solid #f1f5f9; padding-top:10px;">
            🍭 Цукор: <b id="v_sugar">0</b>г | 🧂 Сіль: <b id="v_salt">0</b>г
        </div>
    </div>

    <div class="water-btn" onclick="addWater()">
        <span>💧 Випито води: <b id="w_txt">0</b> л</span>
        <span>+0.25 л</span>
    </div>

    <div id="meals">
        <div class="meal-card" onclick="toggleM('Breakfast')"><div class="meal-header">Сніданок <span id="k_Breakfast">0</span> ккал <button class="btn-plus" onclick="event.stopPropagation(); openAdd('Breakfast')">+</button></div><div id="det_Breakfast" style="display:none; font-size:14px; margin-top:10px;"></div></div>
        <div class="meal-card" onclick="toggleM('Lunch')"><div class="meal-header">Обід <span id="k_Lunch">0</span> ккал <button class="btn-plus" onclick="event.stopPropagation(); openAdd('Lunch')">+</button></div><div id="det_Lunch" style="display:none; font-size:14px; margin-top:10px;"></div></div>
        <div class="meal-card" onclick="toggleM('Dinner')"><div class="meal-header">Вечеря <span id="k_Dinner">0</span> ккал <button class="btn-plus" onclick="event.stopPropagation(); openAdd('Dinner')">+</button></div><div id="det_Dinner" style="display:none; font-size:14px; margin-top:10px;"></div></div>
    </div>

    <div id="chatBox">
        <div style="background:var(--indigo); color:white; padding:15px; display:flex; justify-content:space-between;"><b>Дієтолог ШІ</b> <span onclick="document.getElementById('chatBox').style.display='none'">✕</span></div>
        <div id="chatMessages" style="flex:1; overflow-y:auto; padding:15px; font-size:14px;"></div>
        <div style="display:flex; border-top:1px solid #eee;"><input id="chatIn" placeholder="Запитай..."><button onclick="sendChat()" style="padding:10px;">➡</button></div>
    </div>
    <div class="chat-btn" onclick="document.getElementById('chatBox').style.display='flex'">💬</div>

    <div id="addModal" class="modal"><div class="modal-content"><h3>Додати страву</h3><button class="btn-main" onclick="document.getElementById('fIn').click()">📸 Зробити фото</button><textarea id="tIn" placeholder="Або напиши текстом..." style="width:100%; margin-top:10px; height:80px;"></textarea><button class="btn-main" style="background:var(--indigo)" onclick="doAnalyze()">ШІ Аналіз</button></div></div>
    <div id="confirmModal" class="modal"><div class="modal-content"><h3>Результат</h3><input id="resN"><input id="resK" type="number"><button class="btn-main" onclick="finalSave()">Записати</button></div></div>

    <input type="file" id="fIn" style="display:none" onchange="doAnalyze()">

    <script>
        const tg = window.Telegram.WebApp; const uid = tg.initDataUnsafe.user?.id || "test_user";
        const API = "https://fitness-app-production-b4a3.up.railway.app";
        let activeM = "", lastRes = {};

        document.getElementById('datePicker').value = new Date().toISOString().split('T')[0];

        async function load() {
            const r = await fetch(`${API}/stats?user_id=${uid}&date=${document.getElementById('datePicker').value}`);
            const d = await r.json();
            if(!d.profile) { document.getElementById('onboarding').style.display = 'flex'; return; }
            
            document.getElementById('onboarding').style.display = 'none';
            document.getElementById('k_left').innerText = Math.max(0, d.norms.kcal - d.kcal);
            document.getElementById('m_ring').style.strokeDashoffset = 452 - (452 * Math.min(1, d.kcal/d.norms.kcal));
            document.getElementById('v_p').innerText = Math.round(d.p);
            document.getElementById('v_f').innerText = Math.round(d.f);
            document.getElementById('v_c').innerText = Math.round(d.c);
            document.getElementById('v_sugar').innerText = Math.round(d.sugar);
            document.getElementById('v_salt').innerText = Math.round(d.salt);
            document.getElementById('w_txt').innerText = d.water;

            ["Breakfast", "Lunch", "Dinner"].forEach(m => {
                document.getElementById('k_'+m).innerText = d.meals[m].kcal;
                document.getElementById('det_'+m).innerHTML = d.meals[m].list.map(i => `<div>${i.food_name} (${i.calories})</div>`).join('');
            });
        }

        async function startSetup() {
            const data = { gender: document.getElementById('reg_g').value, age: parseInt(document.getElementById('reg_a').value), weight: parseFloat(document.getElementById('reg_w').value), height: parseFloat(document.getElementById('reg_h').value), activity: document.getElementById('reg_act').value };
            const r = await fetch(`${API}/calculate_norms`, {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(data)});
            const norms = await r.json();
            await fetch(`${API}/save_profile`, {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({user_id:uid, ...data, c_kcal:norms.kcal, c_p:norms.p, c_f:norms.f, c_c:norms.c})});
            load();
        }

        async function doAnalyze() {
            const fd = new FormData();
            if(document.getElementById('fIn').files[0]) fd.append('file', document.getElementById('fIn').files[0]);
            if(document.getElementById('tIn').value) fd.append('text_input', document.getElementById('tIn').value);
            const r = await fetch(`${API}/analyze`, {method:'POST', body:fd});
            lastRes = await r.json();
            document.getElementById('resN').value = lastRes.name;
            document.getElementById('resK').value = lastRes.kcal;
            document.getElementById('addModal').style.display = 'none';
            document.getElementById('confirmModal').style.display = 'flex';
        }

        async function finalSave() {
            await fetch(`${API}/confirm_save`, {method:'POST', headers:{'Content-Type':'application/json'}, 
                body:JSON.stringify({user_id:uid, date:document.getElementById('datePicker').value, meal_type:activeM, name:document.getElementById('resN').value, kcal:document.getElementById('resK').value, ...lastRes})});
            document.getElementById('confirmModal').style.display = 'none'; load();
        }

        async function addWater() { await fetch(`${API}/add_water?user_id=${uid}&date=${document.getElementById('datePicker').value}&amount=0.25`, {method:'POST'}); load(); }
        
        async function sendChat() {
            const inp = document.getElementById('chatIn');
            const box = document.getElementById('chatMessages');
            box.innerHTML += `<p><b>Ти:</b> ${inp.value}</p>`;
            const fd = new FormData(); fd.append('msg', inp.value);
            const r = await fetch(`${API}/chat`, {method:'POST', body:fd});
            const d = await r.json();
            box.innerHTML += `<p style="color:var(--indigo)"><b>ШІ:</b> ${d.reply}</p>`;
            inp.value = ""; box.scrollTop = box.scrollHeight;
        }

        function changeDay(delta) { let d = new Date(document.getElementById('datePicker').value); d.setDate(d.getDate()+delta); document.getElementById('datePicker').value=d.toISOString().split('T')[0]; load(); }
        function toggleM(m) { const el = document.getElementById('det_'+m); el.style.display = el.style.display === 'none' ? 'block' : 'none'; }
        function openAdd(m) { activeM = m; document.getElementById('addModal').style.display = 'flex'; }

        load(); tg.expand();
    </script>
</body>
</html>
