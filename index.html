<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FitLio Fix</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; background: #f2f4f7; padding: 20px; text-align: center; }
        .card { background: white; border-radius: 20px; padding: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); margin-bottom: 20px; }
        button { background: #34c759; color: white; border: none; padding: 15px 30px; border-radius: 15px; font-weight: bold; width: 100%; font-size: 16px; margin: 5px 0; }
        #log { font-size: 10px; color: red; margin-top: 20px; text-align: left; overflow-wrap: break-word; }
    </style>
</head>
<body>

    <div class="card">
        <h2 id="kcal">0</h2>
        <p>ккал сьогодні</p>
        <div style="display: flex; justify-content: space-around;">
            <span>Б: <b id="p">0</b></span>
            <span>Ж: <b id="f">0</b></span>
            <span>В: <b id="c">0</b></span>
        </div>
    </div>

    <button onclick="addW()">💧 ДОДАТИ ВОДУ (+250мл)</button>
    <button onclick="testServer()" style="background: #007aff;">🔍 ПЕРЕВІРИТИ ЗВ'ЯЗОК</button>
    
    <div id="log"></div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        
        // --- ПЕРЕВІР ЦЕ ПОСИЛАННЯ ДУЖЕ УВАЖНО ---
        // Відкрий Railway, вкладка "Settings", знайди "Public Networking" і скопіюй URL звідти.
        const API = "https://fitness-app-production-b4a3.up.railway.app"; 

        async function testServer() {
            const log = document.getElementById('log');
            log.innerHTML = "Спроба з'єднання з: " + API + "...<br>";
            try {
                const r = await fetch(API + "/");
                const d = await r.json();
                alert("УРА! Сервер відповів: " + JSON.stringify(d));
                log.innerHTML += "✅ Зв'язок встановлено!";
            } catch (e) {
                alert("ПОМИЛКА: Сервер не відповідає. Перевір URL!");
                log.innerHTML += "❌ Помилка: " + e.message;
            }
        }

        async function load() {
            try {
                const r = await fetch(`${API}/stats?user_id=test`);
                const d = await r.json();
                document.getElementById('kcal').innerText = d.kcal || 0;
                document.getElementById('p').innerText = d.p || 0;
                document.getElementById('f').innerText = d.f || 0;
                document.getElementById('c').innerText = d.c || 0;
            } catch(e) { console.log("Load error"); }
        }

        async function addW() {
            try {
                const r = await fetch(`${API}/add_water?user_id=test&amount=0.25`, {method:'POST'});
                if(r.ok) {
                    alert("Воду додано!");
                    load();
                }
            } catch(e) {
                alert("Не вдалося додати воду: " + e.message);
            }
        }

        load();
    </script>
</body>
</html>
